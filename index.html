<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orianne & Steeven | L'Union</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:ital,wght@0,200;0,400;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #8E44AD;
            --deep-purple: #6C3483;
            --light-purple: #D2B4DE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('image.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: var(--light-purple);
            font-family: 'Montserrat', sans-serif;
            font-style: italic;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .intro-container {
            z-index: 1;
            opacity: 0;
            animation: fadeIn 2s ease-out forwards 0.5s;
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .names-svg {
            width: 100%;
            max-width: 520px;
            overflow: visible;
            margin-bottom: 25px;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }

        .unit {
            width: 65px;
            height: 65px;
            background: rgba(108, 52, 131, 0.3);
            border: 1px solid rgba(210, 180, 222, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .num {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            font-style: normal;
        }

        .label {
            font-size: 0.6rem;
            text-transform: lowercase;
            margin-top: 2px;
            color: var(--light-purple);
        }

        .date {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 8vw, 3rem);
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            min-width: 280px;
            margin-bottom: 40px;
            color: #fff;
            font-style: normal;
        }

        .enter-btn {
            display: block;
            width: 85%;
            max-width: 350px;
            padding: 18px 0;
            background: rgba(255, 255, 255, 0.95);
            color: var(--deep-purple) !important;
            text-decoration: none;
            font-size: 1.4rem;
            font-family: 'Great Vibes', cursive;
            font-style: normal;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            border: none;
        }

        .enter-btn:active {
            transform: scale(0.95);
            background: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="intro-container">

    <!--
        Les deux prénoms utilisent text-anchor="start" avec textLength fixe.
        - Orianne part de x="10", occupe 260px → finit à x=270
        - Steeven part de x="320", occupe 260px → finit à x=580
        Le viewBox (0 0 600 220) englobe tout avec 10-20px de marge de chaque côté.
        Pas de text-anchor="end" qui cause des bugs de clipping sur Safari/WebKit.
    -->
    <svg class="names-svg" viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="nameGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#D2B4DE"/>
            </linearGradient>
        </defs>

        <!-- Orianne : démarre à x=10, largeur 260px → finit à 270 -->
        <text
            x="10" y="88"
            font-family="'Great Vibes', cursive"
            font-size="88"
            fill="url(#nameGrad)"
            text-anchor="start"
            textLength="260"
            lengthAdjust="spacingAndGlyphs"
        >Orianne</text>

        <!-- & centré -->
        <text
            x="300" y="138"
            font-family="'Great Vibes', cursive"
            font-size="46"
            fill="#ffffff"
            fill-opacity="0.8"
            text-anchor="middle"
        >&amp;</text>

        <!-- Steeven : démarre à x=320, largeur 260px → finit à 580 -->
        <text
            x="320" y="198"
            font-family="'Great Vibes', cursive"
            font-size="88"
            fill="url(#nameGrad)"
            text-anchor="start"
            textLength="260"
            lengthAdjust="spacingAndGlyphs"
        >Steeven</text>
    </svg>

    <div class="countdown-container" id="timer">
        <div class="unit"><span class="num" id="days">00</span><span class="label">jours</span></div>
        <div class="unit"><span class="num" id="hours">00</span><span class="label">heures</span></div>
        <div class="unit"><span class="num" id="mins">00</span><span class="label">min</span></div>
        <div class="unit"><span class="num" id="secs">00</span><span class="label">sec</span></div>
    </div>

    <p class="date">Lundi &nbsp;27 Juillet 2026</p>

    <a href="invitation.html" class="enter-btn">Voir l'invitation</a>
</div>

<script>
    const targetDate = new Date("July 27, 2026 16:30:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById("days").innerText = d.toString().padStart(2, "0");
            document.getElementById("hours").innerText = h.toString().padStart(2, "0");
            document.getElementById("mins").innerText = m.toString().padStart(2, "0");
            document.getElementById("secs").innerText = s.toString().padStart(2, "0");
        } else {
            document.getElementById("timer").innerHTML = "<h2 style='font-family:Great Vibes;color:white;font-style:normal;'>C'est le grand jour !</h2>";
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
