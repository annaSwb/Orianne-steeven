<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orianne & Steeven | L'Union</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:ital,wght@0,200;0,400;1,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #8E44AD; 
            --deep-purple: #6C3483;    
            --light-purple: #D2B4DE;   
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: url('image.jpeg') no-repeat center center fixed;
            background-size: cover;
            color: var(--light-purple);
            font-family: 'Montserrat', sans-serif;
            font-style: italic; 
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: 0;
        }

        .intro-container {
            z-index: 1;
            opacity: 0;
            animation: fadeIn 2s ease-out forwards 0.5s;
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 15vw, 6rem);
            font-weight: 400;
            font-style: normal;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #fff, var(--light-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }

        .unit {
            width: 65px;
            height: 65px;
            background: rgba(108, 52, 131, 0.3);
            border: 1px solid rgba(210, 180, 222, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .num {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
        }

        .label {
            font-size: 0.6rem;
            text-transform: lowercase;
            margin-top: 2px;
            color: var(--light-purple);
        }

        /* MODIFICATION : DATE PLUS GRANDE */
        .date {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 8vw, 3rem); /* Taille augmentée */
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            min-width: 280px;
            margin-bottom: 40px;
            color: #fff;
            font-style: normal; /* Plus lisible en Great Vibes */
        }

        .enter-btn {
            display: block;
            width: 85%;
            max-width: 350px;
            padding: 18px 0;
            background: rgba(255, 255, 255, 0.95);
            color: var(--deep-purple) !important;
            text-decoration: none;
            font-size: 1.4rem;
            font-family: 'Great Vibes', cursive;
            font-style: normal;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            border: none;
        }

        .enter-btn:active {
            transform: scale(0.95);
            background: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>

<div class="intro-container">
    <h1>Orianne & Steeven</h1>
    
    <div class="countdown-container" id="timer">
        <div class="unit"><span class="num" id="days">00</span><span class="label">jours</span></div>
        <div class="unit"><span class="num" id="hours">00</span><span class="label">heures</span></div>
        <div class="unit"><span class="num" id="mins">00</span><span class="label">min</span></div>
        <div class="unit"><span class="num" id="secs">00</span><span class="label">sec</span></div>
    </div>

    <p class="date">27 Juillet 2026</p>

    <a href="invitation.html" class="enter-btn">Voir l'invitation</a>
</div>

<script>
    const targetDate = new Date("July 27, 2026 16:30:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff > 0) {
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById("days").innerText = d.toString().padStart(2, "0");
            document.getElementById("hours").innerText = h.toString().padStart(2, "0");
            document.getElementById("mins").innerText = m.toString().padStart(2, "0");
            document.getElementById("secs").innerText = s.toString().padStart(2, "0");
        } else {
            document.getElementById("timer").innerHTML = "<h2 style='font-family:Great Vibes;color:white;'>C'est le grand jour !</h2>";
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
